[custom]
; ==========================================================
; 1. 策略组建设：使用逗号分隔的关键字，确保后端百分百匹配
; ==========================================================

; 【AI_Node 专属组】
custom_proxy_group=AI_Node`select`JMS-1389797@c29s4.portablesubmarines.com:18776

; 【子组定义】使用关键字而非正则，直接抓取节点
custom_proxy_group=HK_UrlTest`url-test`香港,HK,HongKong,Hong Kong`http://www.google.com/generate_204`300
custom_proxy_group=HK_Fallback`fallback`香港,HK,HongKong,Hong Kong`http://www.google.com/generate_204`300

; 【HK 总组】直接引用已定义的子组，并加入关键字匹配项
custom_proxy_group=HK`select`HK_UrlTest,HK_Fallback,香港,HK,HongKong,Hong Kong

; 【Proxies 组】兜底
custom_proxy_group=Proxies`select`.*


; ==========================================================
; 2. 规则集与自定义规则：确保最高优先级
; ==========================================================

; 🌟 电视专项自定义规则 (强制绑定 HK 组)
custom_rules=DOMAIN-SUFFIX,mytvsuper.com,HK
custom_rules=DOMAIN-SUFFIX,tvbanywhere.com,HK
