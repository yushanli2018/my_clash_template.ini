[custom]
; ==========================================================
; 1. 策略组建设：核心区域
; ==========================================================

; 【AI_Node 专属组】：彻底劫持 AI 流量，只走你指定的这一个节点
custom_proxy_group=AI_Node`select`JMS-1389797@c29s4.portablesubmarines.com:18776

; 【HK 核心组】：面板里的大管家，包含手动、自动和故障切换
custom_proxy_group=HK`select`[]HK_UrlTest[]HK_Fallback[](?i)港|hk|hongkong|hong kong

; 【HK_UrlTest】：自动测速，永远选最快
custom_proxy_group=HK_UrlTest`url-test`(?i)港|hk|hongkong|hong kong`http://www.google.com/generate_204`300

; 【HK_Fallback】：故障转移，断了自动换
custom_proxy_group=HK_Fallback`fallback`(?i)港|hk|hongkong|hong kong`http://www.google.com/generate_204`300

; 【Proxies 组】：兜底大组
custom_proxy_group=Proxies`select`.*


; ==========================================================
; 2. 规则集定义：最高优先级 (按顺序执行)
; ==========================================================

; 🌟【最高优先级】AI 规则直接指派给 AI_Node
ruleset=AI_Node,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAI.list

; 🌟【最高优先级】电视规则指派给 HK 大管家组
ruleset=HK,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/HongKongMedia.list
ruleset=HK,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTubeMusic.list

; 🌟【标准规则集】引入其他日常分流 (按需加载)
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,[]GEOIP,CN
ruleset=Proxies,[]MATCH
