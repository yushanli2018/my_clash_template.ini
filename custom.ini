rules_prepend==DOMAIN,generativelanguage.googleapis.com,AI_Node
rules_prepend==DOMAIN-KEYWORD,generativelanguage,AI_Node
rules_prepend==DOMAIN-SUFFIX,anthropic.com,AI_Node
rules_prepend==DOMAIN-SUFFIX,claude.ai,AI_Node
