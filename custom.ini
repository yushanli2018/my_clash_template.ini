[custom]
; 1. 完美继承 ACL4SSR 完整版规则的所有分组和域名规则
include=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini

; 2. 强行在原有策略组列表的「最前面」插入一个专属的 AI 节点策略组
; 语法：组名=type, 节点名字
proxy_groups=AI_Node`select`JMS-1389797@c29s4.portablesubmarines.com:18776

; 3. 劫持原有的 HK 策略组，利用正则，强行让它只抓取你机场里的香港节点
; 这样电视规则流向 HK 组时，里面就只有纯正的香港节点
rules_edit==HK!!(?i)港|hk|hongkong|hong kong

; 4. 强行前置插入你的自定义域名规则（用 rules_prepend 语法，优先级最高，神仙也截胡不了）
rules_prepend==DOMAIN-SUFFIX,sora.com,AI_Node
rules_prepend==DOMAIN-SUFFIX,openai.com,AI_Node
rules_prepend==DOMAIN-SUFFIX,chatgpt.com,AI_Node
rules_prepend==DOMAIN-SUFFIX,oaistatic.com,AI_Node
rules_prepend==DOMAIN-SUFFIX,oaiusercontent.com,AI_Node
