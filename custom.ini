custom_rules=DOMAIN-SUFFIX,tvbc.com.cn,HK
custom_rules=DOMAIN-SUFFIX,tvbeventpower.com.hk,HK
custom_rules=DOMAIN-SUFFIX,tvbusa.com,HK
custom_rules=DOMAIN-SUFFIX,tvbweekly.com,HK
custom_rules=DOMAIN-SUFFIX,tvmedia.net.au,HK
custom_rules=DOMAIN-SUFFIX,nowe.com,HK
custom_rules=DOMAIN-SUFFIX,nowestatic.com,HK
custom_rules=DOMAIN-SUFFIX,viu.com,HK
custom_rules=DOMAIN-SUFFIX,viu.now.com,HK
custom_rules=DOMAIN-SUFFIX,viu.tv,HK
custom_rules=DOMAIN-SUFFIX,hoy.tv,HK
custom_rules=DOMAIN,mytvsuperlimited.hb.omtrdc.net,HK
custom_rules=DOMAIN,mytvsuperlimited.sc.omtrdc.net,HK
custom_rules=DOMAIN,cognito-identity.us-east-1.amazonaws.com,HK
custom_rules=DOMAIN,d1k2us671qcoau.cloudfront.net,HK
custom_rules=DOMAIN,d2anahhhmp1ffz.cloudfront.net,HK
custom_rules=DOMAIN,dfp6rglgjqszk.cloudfront.net,HK
custom_rules=DOMAIN,d3o7oi00quuwqu.cloudfront.net,HK
custom_rules=DOMAIN,mobileanalytics.us-east-1.amazonaws.com,HK

; 🌟 强制 AI 走专属节点
ruleset=AI_Node,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAI.list

; 🌟 电视流量走 HK 组
ruleset=HK,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/HongKongMedia.list
ruleset=HK,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTubeMusic.list

; 🌟 基础兜底逻辑
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,[]GEOIP,CN
ruleset=Proxies,[]MATCH
